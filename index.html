<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Plataforma de entrega oficial Fígado Leve - Dona Sebastiana. Acesse seu guia e mude de vida comendo bem.">
  <meta name="theme-color" content="#16324A">
  <title>Acesso à Plataforma - Fígado Leve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilos extras em linha para garantir carregamento instantâneo da tela de acesso */
    html, body {
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-icon">🌿</div>
    <h1 class="login-title">FÍGADO LEVE</h1>
    <p class="login-subtitle">Plataforma de Entrega Oficial da Dona Sebastiana</p>
    
    <p class="login-texto-ajuda">
      Olá, minha filha! Que bom ter você aqui. Você recebeu sua senha de acesso no seu e-mail após a compra. Digite ela abaixo para abrir a nossa plataforma e começar a cuidar de você.
    </p>
    
    <form id="login-form">
      <input type="password" id="senha-acesso" class="login-input" placeholder="Digite sua senha de acesso" required autofocus>
      <button type="submit" class="login-btn">Entrar na Plataforma 🔓</button>
      <div id="erro-mensagem" class="login-erro"></div>
    </form>
  </div>

  <script>
    // Se o usuário já tiver acesso válido salvo no localStorage, redireciona de imediato
    if (localStorage.getItem("acesso_principal") === "true") {
      window.location.href = "reader.html";
    }

    const form = document.getElementById("login-form");
    const inputSenha = document.getElementById("senha-acesso");
    const erroMsg = document.getElementById("erro-mensagem");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const senha = inputSenha.value.trim().toLowerCase();
      
      // Senha principal decidida: 'figadoleve'
      if (senha === "figadoleve") {
        localStorage.setItem("acesso_principal", "true");
        window.location.href = "reader.html";
      } else {
        erroMsg.innerText = "Senha incorreta, minha filha. Dê uma olhadinha no seu e-mail de compra.";
        inputSenha.value = "";
        inputSenha.focus();
      }
    });
  </script>
</body>
</html>
